position: MSci, Imperial College London
description: >-
  Je suis étudiant en dernière année de MSci en mathématiques à [Imperial College London](https://www.imperial.ac.uk/). J'ai également été stagiaire de recherche dans l'équipe [AROMATH](https://team.inria.fr/aromath/team-members/) à [Inria](https://www.inria.fr/en/inria-centre-universite-cote-azur).

  Mes intérêts de recherche se situent en géométrie algébrique, notamment autour de la théorie des déformations, des schémas de Hilbert (de points), des problèmes de modules et de la géométrie algébrique computationnelle. Je travaille actuellement sur mon mémoire de master sous la direction de [Dr. Matt Booth](http://mattbooth.info/), consacré aux déformations de schémas algébriques et à leurs applications aux problèmes de modules, avec un intérêt particulier pour les structures combinatoires des points fixes par un tore des schémas de Hilbert emboîtés de points. Auparavant, j'ai travaillé avec [Dr. Laurent Busé](https://www-sop.inria.fr/members/Laurent.Buse/index.html) sur la représentation implicite de courbes et surfaces algébriques par des matrices issues de syzygies. J'ai aussi contribué au développement du package [GameTheory](https://macaulay2.com/doc/Macaulay2/share/doc/Macaulay2/GameTheory/html/index.html) pour [Macaulay2](https://macaulay2.com/).
