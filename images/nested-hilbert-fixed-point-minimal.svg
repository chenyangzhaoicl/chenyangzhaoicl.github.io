<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 796 496" role="img" aria-labelledby="title desc">
  <title id="title">Young diagram and torus-fixed point</title>
  <desc id="desc">A Young diagram with one highlighted removable corner corresponds to a torus-fixed point and monomial.</desc>
  <defs>
    <style>
      .panel { fill: #fffdf7; stroke: #e4dfd2; stroke-width: 2; }
      .cell { fill: #ffffff; stroke: #18211f; stroke-width: 3; }
      .corner { fill: #f2b84b; stroke: #18211f; stroke-width: 3; }
      .ink { fill: #17211f; }
      .muted { fill: #65706c; }
      .teal { fill: #2f9b8f; }
      .teal-line { stroke: #2f9b8f; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      text { font-family: "Noto Sans", "Google Sans", Arial, sans-serif; }
    </style>
  </defs>

  <rect width="796" height="496" fill="#fbfaf4"/>
  <rect class="panel" x="42" y="40" width="712" height="416" rx="26"/>

  <g transform="translate(146 111)">
    <rect class="cell" x="0" y="0" width="58" height="58"/>
    <rect class="cell" x="58" y="0" width="58" height="58"/>
    <rect class="cell" x="116" y="0" width="58" height="58"/>
    <rect class="cell" x="174" y="0" width="58" height="58"/>

    <rect class="cell" x="0" y="58" width="58" height="58"/>
    <rect class="cell" x="58" y="58" width="58" height="58"/>
    <rect class="corner" x="116" y="58" width="58" height="58"/>

    <rect class="cell" x="0" y="116" width="58" height="58"/>
    <rect class="cell" x="58" y="116" width="58" height="58"/>

    <rect class="cell" x="0" y="174" width="58" height="58"/>
  </g>

  <path class="teal-line" d="M357 213c58-20 90-20 146 0"/>
  <path class="teal" d="M532 228l-47 9 26-40z"/>

  <g transform="translate(521 140)">
    <circle cx="86" cy="98" r="67" fill="#dff3ee" stroke="#2f9b8f" stroke-width="4"/>
    <circle cx="86" cy="98" r="11" class="teal"/>
    <path d="M86 31v134M19 98h134M39 51l94 94M133 51l-94 94" stroke="#2f9b8f" stroke-width="3" stroke-linecap="round" opacity="0.36"/>
    <text class="ink" x="86" y="215" font-size="34" font-weight="700" text-anchor="middle">T-fixed</text>
  </g>

  <text class="ink" x="244" y="414" font-size="32" font-weight="700" text-anchor="middle">Young diagram</text>
</svg>
